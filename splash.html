<!doctype html>
<html>
  <head>
    <style>
      body,
      html {
        --background: #121212;
        --primary: #15794a;
        --text_on_surface: #ffffff;
        --text_faded: #bbbbbbd8;

        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-size: 62.5%;
        --font-size: 1.6rem;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--background);
        color: var(--text_on_surface);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        -webkit-app-region: drag;
      }

      /* Center Content */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .app-icon {
        width: 9.6rem;
        height: 9.6rem;
        margin-bottom: 1.6rem;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
      }

      .app-name {
        font-size: 2.2rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .app-version {
        font-size: 1.2rem;
        opacity: 0.5;
        margin-top: 0.4rem;
      }

      .footer {
        width: 100%;
      }

      .status-label {
        font-size: 1.1rem;
        padding: 0 1.5rem 0.8rem 1.5rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text_faded);
      }

      .progress-container {
        width: 100%;
        height: 5px; /* Thin, modern bar */
        background: rgba(255, 255, 255, 0.1);
      }

      #progress-fill {
        width: 0%;
        height: 100%;
        background: var(--primary);
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body>
    <div class="content">
      <img class="app-icon" src="public/favicon.ico" alt="Logo" />
      <div class="app-name">Electron App</div>
      <div class="app-version" id="app-version">Loading...</div>
    </div>

    <div class="footer">
      <div class="status-label" id="status-text">Initializing...</div>
      <div class="progress-container">
        <div id="progress-fill"></div>
      </div>
    </div>

    <script>
      // Placeholder for Electron IPC communication
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('progress-update', (event, { label, percent }) => {
        document.getElementById('status-text').innerText = label;
        document.getElementById('progress-fill').style.width = percent + '%';
      });

      ipcRenderer.on('app-version', (_event, { version }) => {
        const display = (document.getElementById('app-version').innerText = `Version ${version}`);
      });
    </script>
  </body>
</html>
